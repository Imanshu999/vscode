name: Build Takano3D APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '16.20.2'

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Hard-Block Broken Microsoft Git URL
      run: |
        # गिट सिस्टम के अंदर इस खराब लिंक को हमेशा के लिए एक डमी चालू रिपो पर रीडायरेक्ट करना
        git config --global url."https://github.com/actions/checkout".insteadOf "https://github.com/microsoft/vscode-gulp-electron"
        git config --global url."https://github.com/actions/checkout.git".insteadOf "https://github.com/microsoft/vscode-gulp-electron.git"
        git config --global url."https://github.com/actions/checkout.git".insteadOf "git+https://github.com/microsoft/vscode-gulp-electron.git"
        git config --global url."https://github.com/actions/checkout.git".insteadOf "git+ssh://git@github.com/microsoft/vscode-gulp-electron.git"
        
        # सभी पुराने लॉक और कैश को पूरी तरह मिटाना
        rm -rf yarn.lock package-lock.json
        find . -name "yarn.lock" -type f -delete
        find . -name "package-lock.json" -type f -delete

    - name: Clean package.json Dependencies
      run: |
        # पूरे प्रोजेक्ट की हर एक package.json फ़ाइल में से इसका वजूद मिटाना
        find . -name "package.json" -type f -exec node -e "
          const fs = require('fs');
          const file = process.argv[1];
          try {
            let content = fs.readFileSync(file, 'utf8');
            if (content.includes('vscode-gulp-electron')) {
              const pkg = JSON.parse(content);
              if (pkg.dependencies) delete pkg.dependencies['vscode-gulp-electron'];
              if (pkg.devDependencies) delete pkg.devDependencies['vscode-gulp-electron'];
              if (pkg.optionalDependencies) delete pkg.optionalDependencies['vscode-gulp-electron'];
              fs.writeFileSync(file, JSON.stringify(pkg, null, 2));
              console.log('Successfully deleted from:', file);
            }
          } catch(e) {}
        " {} \;

    - name: Install Root Dependencies
      run: |
        yarn config set ignore-engines true
        # बिना किसी नेटवर्क रुकावट के जबरदस्ती सिर्फ ज़रूरी चीज़ें इंस्टॉल करना
        yarn install --ignore-scripts --prefer-offline --network-timeout 200000

    - name: Compile VS Code Web Assets
      run: |
        yarn compile
        yarn gulp compile-web

    - name: Install Capacitor CLI & Core
      run: npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Initialize Capacitor Project
      run: npx cap init "Takano3D Code" "com.takano3d.app" --web-dir=out-monaco

    - name: Add Android Platform
      run: npx cap add android

    - name: Copy Web Build to Android Assets
      run: npx cap sync android

    - name: Build Unsigned APK via Gradle
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload Takano3D APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Takano3D-Code-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
