name: Build Takano3D APK (Hybrid Cloud Mode)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 21 (With Strict Environment)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Create Web Directory
      run: |
        mkdir -p out-monaco
        echo '<!DOCTYPE html><html><body><h1>Loading Takano3D Code...</h1></body></html>' > out-monaco/index.html

    - name: Setup Node.js (For Capacitor CLI)
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Capacitor CLI & Core Safely
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps --ignore-scripts --no-audit

    - name: Inject Live Server URL into Capacitor
      run: |
        node -e "
          const fs = require('fs');
          let config = {};
          if (fs.existsSync('capacitor.config.json')) {
            config = JSON.parse(fs.readFileSync('capacitor.config.json', 'utf8'));
          } else {
            config = { appId: 'com.takano3d.app', appName: 'Takano3D Code' };
          }
          config.webDir = 'out-monaco';
          config.server = {
            'url': 'https://vscode.dev',
            'cleartext': true,
            'allowNavigation': ['vscode.dev', '*.vscode.dev', 'github.com']
          };
          config.plugins = {
            'CapacitorCookies': { 'enabled': true }
          };
          fs.writeFileSync('capacitor.config.json', JSON.stringify(config, null, 2));
        "

    - name: Add Android Platform
      run: |
        npx cap add android || true

    - name: Nuke Old Adaptive Icons & Inject Real VS Code Icon
      run: |
        cd android/app/src/main/res
        
        # 1. पहले से मौजूद कैपेसिटर के एडेप्टिव आइकन की एक्सएमएल फाइलों को डिलीट करना ताकि वे पुराने आइकन को फोर्स न करें
        find . -name "ic_launcher_background.xml" -delete
        find . -name "ic_launcher_foreground.xml" -delete
        find . -name "ic_launcher.xml" -delete
        
        # वीएस कोड का ऑफिशियल हाई-रेजोल्यूशन आइकन यूआरएल
        ICON_URL="https://raw.githubusercontent.com/microsoft/vscode/main/resources/linux/code.png"
        
        # 2. सभी मिपमैप फोल्डर्स में पुराने सभी आइकन्स को सीधे वीएस कोड के आइकन से रिप्लेस करना
        for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
          if [ -d "$dir" ]; then
            curl -sL "$ICON_URL" -o "$dir/ic_launcher.png"
            curl -sL "$ICON_URL" -o "$dir/ic_launcher_round.png"
            curl -sL "$ICON_URL" -o "$dir/ic_launcher_foreground.png"
          fi
        done
        
        # 3. एडेप्टिव आइकन को बायपास करने के लिए एक फ्लैट बैकग्राउंड एक्सएमएल जनरेट करना (ताकि सिर्फ वीएस कोड आइकन दिखे)
        mkdir -p drawable
        echo '<?xml version="1.0" encoding="utf-8"?><shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle"><solid android:color="#1e1e1e"/></shape>' > drawable/ic_launcher_background.xml
        
        # मिपमैप-एनी-डीपीआई फोल्डर में एडेप्टिव कॉन्फ़िगरेशन को अपडेट करना
        mkdir -p mipmap-anydpi-v26
        echo '<?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@drawable/ic_launcher_background"/><foreground android:drawable="@mipmap/ic_launcher_foreground"/></adaptive-icon>' > mipmap-anydpi-v26/ic_launcher.xml
        echo '<?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@drawable/ic_launcher_background"/><foreground android:drawable="@mipmap/ic_launcher_foreground"/></adaptive-icon>' > mipmap-anydpi-v26/ic_launcher_round.xml
        
        echo "Nuked capacitor branding and successfully injected VS Code Adaptive Icon!"

    - name: Fix Network & Mixed Content Security
      run: |
        CONFIG_FILE="android/app/src/main/res/xml/network_security_config.xml"
        if [ -f "$CONFIG_FILE" ]; then
          echo '<?xml version="1.0" encoding="utf-8"?><network-security-config><base-config cleartextTrafficAllowed="true"><trust-anchors><certs src="system" /><certs src="user" /></trust-anchors></base-config></network-security-config>' > $CONFIG_FILE
        fi

    - name: Copy and Sync Assets
      run: npx cap sync android

    - name: Build Unsigned APK via Gradle (Force Java 21)
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME_21_X64

    - name: Upload Takano3D APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Takano3D-Code-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
