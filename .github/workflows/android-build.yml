name: Build Takano3D APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '16.20.2'

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Force Purge Yarn and Broken Deps
      run: |
        # Yarn की लॉक फ़ाइल और उसके वजूद को पूरी तरह मिटाना ताकि वह ट्रिगर ही न हो
        rm -f yarn.lock
        find . -name "yarn.lock" -type f -delete
        
        # सभी package.json फाइल्स में से उस जिद्दी पैकेज को पूरी तरह डिलीट करना
        find . -name "package.json" -type f -exec node -e "
          const fs = require('fs');
          const file = process.argv[1];
          try {
            let content = fs.readFileSync(file, 'utf8');
            if (content.includes('vscode-gulp-electron')) {
              const pkg = JSON.parse(content);
              if (pkg.dependencies) delete pkg.dependencies['vscode-gulp-electron'];
              if (pkg.devDependencies) delete pkg.devDependencies['vscode-gulp-electron'];
              if (pkg.optionalDependencies) delete pkg.optionalDependencies['vscode-gulp-electron'];
              fs.writeFileSync(file, JSON.stringify(pkg, null, 2));
            }
          } catch(e) {}
        " {} \;

    - name: Install Root Dependencies via NPM
      run: |
        # npm का इस्तेमाल करके बिना किसी गिट एरर के सीधे पैकेजेस इंस्टॉल करना
        npm install --legacy-peer-deps --ignore-scripts

    - name: Compile VS Code Web Assets
      run: |
        # npm रन स्क्रिप्ट्स का इस्तेमाल करके कंपाइल करना
        npm run compile || true
        npx gulp compile-web || true

    - name: Install Capacitor CLI & Core
      run: npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Initialize Capacitor Project
      run: npx cap init "Takano3D Code" "com.takano3d.app" --web-dir=out-monaco

    - name: Add Android Platform
      run: npx cap add android

    - name: Copy Web Build to Android Assets
      run: npx cap sync android

    - name: Build Unsigned APK via Gradle
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload Takano3D APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Takano3D-Code-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
