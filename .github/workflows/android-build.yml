name: Build Takano3D APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Initialize Web Directory for VSCode
      run: |
        mkdir -p out-monaco
        # सीधे vscode.dev पर रीडायरेक्ट करने वाली क्लीन और फ़ास्ट इंडेक्स फ़ाइल बनाना
        echo '<!DOCTYPE html><html><head><title>Takano3D Code</title><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>html, body, iframe { margin: 0; padding: 0; width: 100%; height: 100%; border: none; overflow: hidden; background-color: #1e1e1e; }</style></head><body><iframe src="https://vscode.dev" allow="clipboard-read; clipboard-write; microphone; camera"></iframe></body></html>' > out-monaco/index.html

    - name: Setup Node.js (For Capacitor CLI)
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Capacitor CLI & Core
      run: npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Initialize Capacitor Project
      run: npx cap init "Takano3D Code" "com.takano3d.app" --web-dir=out-monaco

    - name: Add Android Platform
      run: npx cap add android

    - name: Configure Capacitor Android WebView Settings
      run: |
        # vscode.dev को बिना किसी रुकावट के फुलस्क्रीन और क्लियरट्रैफ़िक के साथ लोड करने की अनुमति देना
        CONFIG_FILE="android/app/src/main/res/xml/network_security_config.xml"
        if [ -f "$CONFIG_FILE" ]; then
          echo '<?xml version="1.0" encoding="utf-8"?><network-security-config><base-config cleartextTrafficAllowed="true"><trust-anchors><certs src="system" /><certs src="user" /></trust-anchors></base-config></network-security-config>' > $CONFIG_FILE
        fi

    - name: Copy Web Build to Android Assets
      run: npx cap sync android

    - name: Build Unsigned APK via Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Takano3D APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Takano3D-Code-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
