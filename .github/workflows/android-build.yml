name: Build Takano3D APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js (Legacy for VS Code Build)
      uses: actions/setup-node@v4
      with:
        node-version: '16.20.2'

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Absolute Purge of Native and Broken Dependencies
      run: |
        rm -f yarn.lock package-lock.json
        find . -name "yarn.lock" -type f -delete
        find . -name "package-lock.json" -type f -delete
        
        # सभी package.json फ़ाइलों में से इन जिद्दी पैकेजों का नामोनिशान मिटाना
        find . -name "package.json" -type f -exec node -e "
          const fs = require('fs');
          const file = process.argv[1];
          try {
            let content = fs.readFileSync(file, 'utf8');
            let changed = false;
            const pkg = JSON.parse(content);
            
            const blacklistedDeps = ['vscode-gulp-electron', 'kerberos', 'keytar', 'native-is-elevated'];
            
            ['dependencies', 'devDependencies', 'optionalDependencies', 'peerDependencies'].forEach(type => {
              if (pkg[type]) {
                blacklistedDeps.forEach(dep => {
                  if (pkg[type][dep]) {
                    delete pkg[type][dep];
                    changed = true;
                  }
                });
              }
            });
            
            if (changed) {
              fs.writeFileSync(file, JSON.stringify(pkg, null, 2));
              console.log('Successfully purged bad dependencies from:', file);
            }
          } catch(e) {}
        " {} \;

    - name: Install Root Dependencies via NPM
      run: |
        # बिना किसी ओवरराइड और स्क्रिप्ट के एकदम क्लीन इंस्टॉल
        npm install --legacy-peer-deps --ignore-scripts

    - name: Compile VS Code Web Assets
      run: |
        mkdir -p out-monaco
        npm run compile
        npx gulp compile-web

    - name: Upgrade Node.js (For Capacitor CLI)
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Capacitor CLI & Core
      run: npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Initialize Capacitor Project
      run: npx cap init "Takano3D Code" "com.takano3d.app" --web-dir=out-monaco

    - name: Add Android Platform
      run: npx cap add android

    - name: Copy Web Build to Android Assets
      run: npx cap sync android

    - name: Build Unsigned APK via Gradle
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload Takano3D APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Takano3D-Code-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
