name: Build Takano3D APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '16.20.2'

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Bypass Broken Dependencies
      run: |
        # package.json में जबरदस्ती डमी पैकेज इन्जेक्ट करना ताकि टूटी हुई गिट लिंक पर एरर न आए
        node -e "
        const fs = require('fs');
        const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
        pkg.resolutions = pkg.resolutions || {};
        pkg.resolutions['**/vscode-gulp-electron'] = 'https://registry.npmjs.org/lodash/-/lodash-4.17.21.tgz';
        fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
        "

    - name: Install Root Dependencies
      run: |
        yarn config set ignore-engines true
        yarn install --ignore-scripts --network-timeout 100000

    - name: Compile VS Code Web Assets
      run: |
        yarn compile
        yarn gulp compile-web

    - name: Install Capacitor CLI & Core
      run: npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Initialize Capacitor Project
      run: npx cap init "Takano3D Code" "com.takano3d.app" --web-dir=out-monaco

    - name: Add Android Platform
      run: npx cap add android

    - name: Copy Web Build to Android Assets
      run: npx cap sync android

    - name: Build Unsigned APK via Gradle
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload Takano3D APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Takano3D-Code-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
