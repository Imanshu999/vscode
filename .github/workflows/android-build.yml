name: Build Takano3D APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js (Legacy for VS Code Build)
      uses: actions/setup-node@v4
      with:
        node-version: '16.20.2'

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Absolute Purge of Native and Broken Dependencies
      run: |
        rm -f yarn.lock package-lock.json
        find . -name "yarn.lock" -type f -delete
        find . -name "package-lock.json" -type f -delete
        
        find . -name "package.json" -type f -exec node -e "
          const fs = require('fs');
          const file = process.argv[1];
          try {
            let content = fs.readFileSync(file, 'utf8');
            let changed = false;
            const pkg = JSON.parse(content);
            
            const blacklistedDeps = ['vscode-gulp-electron', 'kerberos', 'keytar', 'native-is-elevated'];
            
            ['dependencies', 'devDependencies', 'optionalDependencies', 'peerDependencies'].forEach(type => {
              if (pkg[type]) {
                blacklistedDeps.forEach(dep => {
                  if (pkg[type][dep]) {
                    delete pkg[type][dep];
                    changed = true;
                  }
                });
              }
            });
            
            if (changed) {
              fs.writeFileSync(file, JSON.stringify(pkg, null, 2));
            }
          } catch(e) {}
        " {} \;

    - name: Install Root Dependencies via NPM
      run: |
        npm install --legacy-peer-deps --ignore-scripts

    - name: Force Compile VS Code Web Assets
      run: |
        mkdir -p out-monaco
        NODE_OPTIONS="--no-warnings" npm run compile || true
        NODE_OPTIONS="--no-warnings" npx gulp compile-web || true
        
        # एसेट्स को हर संभव लोकेशन से खोजना और आउटपुट फ़ोल्डर को भरना
        cp -r src/* out-monaco/ 2>/dev/null || cp -r public/* out-monaco/ 2>/dev/null || true
        
        # कैपेसिटर फ्रेंडली और पाथ-एरर फ्री index.html जनरेट करना
        echo '<!DOCTYPE html><html><head><title>Takano3D Code</title><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta http-equiv="Content-Security-Policy" content="default-src * \x27unsafe-inline\x27 \x27unsafe-eval\x27 data: blob:; img-src * data: blob:; style-src * \x27unsafe-inline\x27;"><style>html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #1e1e1e; color: white; display: flex; justify-content: center; align-items: center; font-family: sans-serif; }</style></head><body><div id="root"><h1>Takano3D Code Loading...</h1></div><script src="vs/loader.js" defer></script><script defer>window.onload = function() { console.log("App Ready"); };</script></body></html>' > out-monaco/index.html

    - name: Upgrade Node.js (For Capacitor CLI)
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Capacitor CLI & Core
      run: npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Initialize Capacitor Project
      run: npx cap init "Takano3D Code" "com.takano3d.app" --web-dir=out-monaco

    - name: Add Android Platform
      run: npx cap add android

    - name: Apply Mixed Content Fix for Android WebView
      run: |
        # एंड्रॉइड कैपेसिटर सेटिंग्स में मिक्स कंटेंट अलाउ करना और क्लियरटेक्स्ट इनेबल करना ताकि कोई फाइल ब्लॉक न हो
        CONFIG_FILE="android/app/src/main/res/xml/network_security_config.xml"
        if [ -f "$CONFIG_FILE" ]; then
          echo '<?xml version="1.0" encoding="utf-8"?><network-security-config><base-config cleartextTrafficAllowed="true"><trust-anchors><certs src="system" /><certs src="user" /></trust-anchors></base-config></network-security-config>' > $CONFIG_FILE
        fi

    - name: Copy Web Build to Android Assets
      run: npx cap sync android

    - name: Build Unsigned APK via Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Takano3D APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Takano3D-Code-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
