name: Build Takano3D APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js (Legacy for VS Code Build)
      uses: actions/setup-node@v4
      with:
        node-version: '16.20.2'

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Force Purge Yarn & Inject NPM Overrides
      run: |
        rm -f yarn.lock
        find . -name "yarn.lock" -type f -delete
        
        # मुख्य package.json में जबरदस्ती overrides इंजेक्ट करना ताकि कोई भी नेटिव पैकेज कंपाइल ही न हो
        node -e "
          const fs = require('fs');
          if (fs.existsSync('package.json')) {
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            
            // पुराने जिद्दी पैकेज हटाना
            if (pkg.dependencies) delete pkg.dependencies['vscode-gulp-electron'];
            if (pkg.devDependencies) delete pkg.devDependencies['vscode-gulp-electron'];
            
            // ओवरराइड्स लागू करना ताकि डीप डिपेंडेंसीज़ भी ब्लॉक हो जाएं
            pkg.overrides = {
              'kerberos': 'empty',
              'keytar': 'empty',
              'native-is-elevated': 'empty'
            };
            
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            console.log('Successfully injected overrides into root package.json');
          }
        "

    - name: Install Root Dependencies via NPM
      run: |
        # --ignore-scripts के साथ पूरी तरह से C++ एरर्स का रास्ता बंद करना
        npm install --legacy-peer-deps --ignore-scripts

    - name: Compile VS Code Web Assets
      run: |
        mkdir -p out-monaco
        # बिना || true के ताकि असली कंपाइलेशन लॉग दिख सके
        npm run compile
        npx gulp compile-web

    - name: Upgrade Node.js (For Capacitor CLI)
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Capacitor CLI & Core
      run: npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Initialize Capacitor Project
      run: npx cap init "Takano3D Code" "com.takano3d.app" --web-dir=out-monaco

    - name: Add Android Platform
      run: npx cap add android

    - name: Copy Web Build to Android Assets
      run: npx cap sync android

    - name: Build Unsigned APK via Gradle
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload Takano3D APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Takano3D-Code-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
